<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Status Monitor</title>

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    margin: 0;
    padding: 16px;
    background: #f4f6f8;
  }

  h2 {
    text-align: center;
    margin-bottom: 16px;
  }

  .container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    background: white;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: transform 0.2s ease;
  }

  .card:hover {
    transform: translateY(-4px);
  }

  .url {
    word-break: break-all;
    font-weight: bold;
    margin-bottom: 12px;
    color: #333;
  }

  .status {
    font-size: 18px;
    font-weight: bold;
  }

  .ok {
    color: green;
  }

  .fail {
    color: red;
  }

  .checking {
    color: #999;
  }

  @media (max-width: 600px) {
    body {
      padding: 10px;
    }
  }
</style>
</head>

<body>

<h2>URL Availability Dashboard</h2>

<div class="container">
  
        <div class="card">
          <div class="url">https://docs.python.org</div>
          <div class="status" data-url="https://docs.python.org">Checking…</div>
        </div>
        
        <div class="card">
          <div class="url">https://search.brave.com/</div>
          <div class="status" data-url="https://search.brave.com/">Checking…</div>
        </div>
        
        <div class="card">
          <div class="url">https://vscode.dev/github.com/</div>
          <div class="status" data-url="https://vscode.dev/github.com/">Checking…</div>
        </div>
        
        <div class="card">
          <div class="url">https://github.com</div>
          <div class="status" data-url="https://github.com">Checking…</div>
        </div>
        
        <div class="card">
          <div class="url">https://copilot.microsoft.com/</div>
          <div class="status" data-url="https://copilot.microsoft.com/">Checking…</div>
        </div>
        
</div>

<script>
function checkURL(el, url) {
  fetch(url, { method: "HEAD", mode: "no-cors" })
    .then(() => {
      el.textContent = "✔ Live";
      el.className = "status ok";
    })
    .catch(() => {
      el.textContent = "✖ Failed";
      el.className = "status fail";
    });
}

document.querySelectorAll(".status").forEach(el => {
  const url = el.dataset.url;
  el.classList.add("checking");
  checkURL(el, url);
});
</script>

</body>
</html>
